# ReserveChain Admin Console CI
# IMPORTANT: GitHub Actions only runs workflows located at the REPOSITORY ROOT
# under .github/workflows/. Move this file to .github/workflows/admin.yml
# (do NOT leave it under admin/ci/).
name: admin

on:
  push:
    paths:
      - 'admin/**'
      - '.github/workflows/admin.yml'
  pull_request:
    paths:
      - 'admin/**'
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: admin
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: admin/package-lock.json
      - name: Install dependencies
        run: npm install --no-audit --no-fund
      - name: Type check
        run: npx tsc --noEmit
      - name: Build
        run: npm run build
        env:
          API_BASE_URL: http://127.0.0.1:4000/api
